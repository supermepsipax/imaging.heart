# ==============================================================================
# Statistical Analysis Pipeline - Configuration File
# ==============================================================================
# This file controls parameters for analyzing processed artery data
# ==============================================================================

# ==============================================================================
# INPUT/OUTPUT CONFIGURATION
# ==============================================================================
# Specify EITHER input_folder OR input_tar_file (not both)

# input_folder: "results/to_test"
# Directory containing individual processed pickle files (*_analysis.pkl)
# from the batch artery analysis pipeline. Each pickle file contains the
# complete graph, diameter profiles, spacing info, and metadata for one artery.
#
# Use this option when analyzing individual files directly.
# Comment out this line if using input_tar_file instead.

input_tar_file: "all_processed_train_data.tar.gz"
# Path to a tar archive containing multiple artery analysis files.
# This file is created at the end of batch processing using archive_artery_analyses()
# or the archive option when prompted after batch processing completes.
#
# Supports: .tar.gz (gzip), .tar.bz2 (bz2), .tar.xz (lzma)
#
# Use this option for memory-efficient streaming analysis without unpacking.
# The archive streams files one-by-one, avoiding memory issues with large datasets.
# Uncomment this line and comment out input_folder to use tar archive mode.

output_folder: "results/all"
# Optional directory for saving statistical analysis results
# Currently used for organizing output, can be used for future CSV exports
# or aggregated statistics files


# ==============================================================================
# ANALYSIS PARAMETERS
# ==============================================================================

diameter_method: "slicing"
# Which diameter measurement method to use for statistics
# Options:
#   - "slicing": Orthogonal slice-based diameter measurements (more accurate)
#   - "edt": Euclidean distance transform-based measurements (faster)
# Both methods are stored in the pickle files, this selects which to analyze

diameter_extraction_mode: "local_range"
# How to extract diameters at bifurcations/trifurcations
# Options:
#   - "entire_segment": Use mean diameter over the entire edge segment
#   - "local_range": Use mean diameter within a specified distance range from bifurcation
# When using "local_range", the local_diameter_range_mm parameter must be specified

local_diameter_range_mm: [1.0, 5.0]
# Distance range (in mm) for local diameter extraction at bifurcations/trifurcations
# Format: [min_distance_mm, max_distance_mm]
# Only used when diameter_extraction_mode = "local_range"
#
# How it works:
#   - For parent edges: measures from the END of the segment (approaching bifurcation)
#   - For child edges: measures from the START of the segment (leaving bifurcation)
#   - Distance is calculated as cumulative path length along voxels (not Euclidean)
#
# Fallback behavior:
#   - If segment length < min_distance: uses entire segment
#   - If segment length > min_distance but < max_distance: uses from min_distance to end
#
# Example: [1.0, 5.0] extracts diameters from voxels between 1-5mm from the bifurcation


# ==============================================================================
# OUTPUT OPTIONS
# ==============================================================================

verbose: true
# Print detailed statistics for each artery
# - true: Print full statistics for all branches and bifurcations
# - false: Print only summary information

print_diameter_profiles: false
# Print complete diameter profiles for main branches
# - true: Print full diameter profile arrays (can be very long)
# - false: Print only summary statistics (recommended)
